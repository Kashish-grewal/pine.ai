<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <rect width="32" height="32" rx="8" fill="#080808"/>

  <!-- Pine tree — geometric, minimal -->
  <!-- Top triangle -->
  <polygon points="16,4 22,13 10,13" fill="#ffffff" opacity="0.95"/>
  <!-- Middle triangle -->
  <polygon points="16,9 23.5,20 8.5,20" fill="#ffffff" opacity="0.85"/>
  <!-- Bottom triangle -->
  <polygon points="16,15 25,27 7,27" fill="#ffffff" opacity="0.75"/>
  <!-- Trunk -->
  <rect x="14.5" y="27" width="3" height="3" rx="0.5" fill="#ffffff" opacity="0.6"/>
</svg>