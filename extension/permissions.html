<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pine.AI — Microphone Setup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f12;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #1a1a22;
      border: 1px solid #2a2a35;
      border-radius: 16px;
      padding: 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 40px; margin-bottom: 8px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: #999; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }
    .btn:hover { background: #6d28d9; transform: translateY(-1px); }
    .btn:disabled { background: #333; cursor: not-allowed; transform: none; }
    .status {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .status.success { display: block; background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .status.error { display: block; background: #2a0a0a; color: #f87171; border: 1px solid #7f1d1d; }
    .steps { text-align: left; margin: 20px 0; }
    .steps li { font-size: 13px; color: #bbb; margin-bottom: 8px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🎤</div>
    <h1>Microphone Setup</h1>
    <p>Pine.AI needs microphone access to record YOUR voice during meetings. Without it, only other participants' voices are captured.</p>
    
    <ol class="steps">
      <li>Click the button below</li>
      <li>Chrome will ask <strong>"Allow microphone?"</strong> → click <strong>Allow</strong></li>
      <li>Done! You can close this tab and start recording</li>
    </ol>

    <button class="btn" id="grantBtn">🎤 Grant Microphone Access</button>
    
    <div class="status" id="status"></div>
  </div>

  <script src="permissions.js"></script>
</body>
</html>
