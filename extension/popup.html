<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pine.AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      min-height: 400px;
      background: #0a0a14;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1a1a3e 0%, #0f0f2a 100%);
      padding: 16px;
      border-bottom: 1px solid #1e1e2e;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo { font-size: 24px; }
    .header-text h1 { font-size: 16px; font-weight: 700; color: #e2e8f0; }
    .header-text p  { font-size: 11px; color: #6b7280; margin-top: 1px; }

    /* ── Status card ── */
    .status-card {
      margin: 14px;
      background: #0f0f1a;
      border-radius: 10px;
      padding: 14px;
      border: 1px solid #1e1e2e;
    }
    .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #374151; flex-shrink: 0;
    }
    .status-dot.recording { background: #ef4444; animation: pulse 1.2s infinite; }
    .status-dot.detected  { background: #f59e0b; }
    .status-dot.idle      { background: #374151; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    .status-label { font-weight: 600; font-size: 13px; }
    .status-label.recording { color: #f87171; }
    .status-label.detected  { color: #fbbf24; }
    .status-label.idle      { color: #6b7280; }

    .meeting-title {
      font-size: 13px; font-weight: 600; color: #c4b5fd;
      margin: 6px 0 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .participants-list {
      display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
    }
    .participant-chip {
      background: #1e1e3a; border: 1px solid #2a2a4e;
      border-radius: 12px; padding: 2px 8px;
      font-size: 11px; color: #a5b4fc;
    }
    .timer { font-size: 11px; color: #4b5563; margin-top: 6px; font-variant-numeric: tabular-nums; }

    /* ── Buttons ── */
    .btn-record {
      width: calc(100% - 28px); margin: 0 14px 14px;
      padding: 12px; border-radius: 8px; border: none;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-record.start {
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      color: #fff;
    }
    .btn-record.start:hover { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); }
    .btn-record.stop {
      background: #1f1a1a; color: #f87171;
      border: 1px solid #ef4444;
    }
    .btn-record.stop:hover { background: #2a1a1a; }
    .btn-record:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Settings ── */
    .settings-section {
      margin: 0 14px 14px;
      background: #0f0f1a; border: 1px solid #1e1e2e;
      border-radius: 10px; overflow: hidden;
    }
    .settings-toggle {
      width: 100%; padding: 10px 14px; background: none;
      border: none; color: #9ca3af; cursor: pointer;
      font-size: 12px; text-align: left;
      display: flex; justify-content: space-between; align-items: center;
    }
    .settings-toggle:hover { color: #e2e8f0; }
    .settings-body { padding: 0 14px 14px; display: none; }
    .settings-body.open { display: block; }

    label { display: block; font-size: 11px; color: #6b7280; margin-bottom: 4px; margin-top: 10px; }
    input[type="text"], input[type="password"] {
      width: 100%; background: #1a1a2e; border: 1px solid #2a2a3e;
      border-radius: 6px; color: #e2e8f0; padding: 7px 10px;
      font-size: 12px; outline: none;
    }
    input:focus { border-color: #6366f1; }

    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 12px;
    }
    .toggle-label { font-size: 12px; color: #9ca3af; }
    .toggle {
      position: relative; width: 36px; height: 20px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; background: #374151;
      border-radius: 20px; cursor: pointer; transition: 0.2s;
    }
    .slider::before {
      content: ''; position: absolute;
      width: 14px; height: 14px; border-radius: 50%;
      background: white; left: 3px; top: 3px;
      transition: 0.2s;
    }
    input:checked + .slider { background: #7c3aed; }
    input:checked + .slider::before { transform: translateX(16px); }

    .save-btn {
      width: 100%; margin-top: 12px; padding: 8px;
      background: #1e1e3a; border: 1px solid #2a2a4e;
      border-radius: 6px; color: #a5b4fc; cursor: pointer;
      font-size: 12px; font-weight: 600;
    }
    .save-btn:hover { background: #2a2a4e; }

    /* ── Footer ── */
    .footer {
      padding: 10px 14px; border-top: 1px solid #1e1e2e;
      font-size: 11px; color: #374151; text-align: center;
    }
    .footer a { color: #6366f1; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    .msg { font-size: 11px; padding: 6px 14px; color: #4ade80; }
    .msg.error { color: #f87171; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">🌲</div>
    <div class="header-text">
      <h1>Pine.AI</h1>
      <p>Google Meet Recorder</p>
    </div>
  </div>

  <!-- Status -->
  <div class="status-card">
    <div class="status-row">
      <div class="status-dot idle" id="statusDot"></div>
      <span class="status-label idle" id="statusLabel">Idle — not in a meeting</span>
    </div>
    <div id="meetingInfo" style="display:none">
      <div class="meeting-title" id="meetingTitle">—</div>
      <div class="participants-list" id="participantsList"></div>
      <div class="timer" id="timer"></div>
    </div>
  </div>

  <!-- Record button -->
  <button class="btn-record start" id="recordBtn">▶ Start Recording</button>

  <!-- Message -->
  <div class="msg" id="msg" style="display:none"></div>

  <!-- Settings -->
  <div class="settings-section">
    <button class="settings-toggle" id="settingsToggle">
      ⚙️ Settings
      <span id="settingsArrow">▼</span>
    </button>
    <div class="settings-body" id="settingsBody">
      <label>Pine.AI Server URL</label>
      <input type="text" id="apiUrl" placeholder="http://localhost:5001" />

      <label>Auth Token <a href="#" id="getTokenLink" style="color:#6366f1;font-size:10px;float:right;">How to get?</a></label>
      <input type="password" id="authToken" placeholder="Paste your Pine.AI auth token here" />

      <div class="toggle-row">
        <span class="toggle-label">🤖 Auto-record when meeting starts</span>
        <label class="toggle">
          <input type="checkbox" id="autoRecord">
          <span class="slider"></span>
        </label>
      </div>

      <button class="save-btn" id="saveBtn">💾 Save Settings</button>
    </div>
  </div>

  <div class="footer">
    Connected to <a href="#" id="dashboardLink">Pine.AI Dashboard</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
