<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Pine.AI Icons</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #080808; color: white; padding: 2rem; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
        .canvas-container { display: flex; gap: 1rem; align-items: flex-end; margin-bottom: 2rem; }
        canvas { border: 1px solid #333; border-radius: 4px; }
        button { background: #ffffff; color: #080808; border: none; padding: 0.5rem 1rem; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:hover { background: #e0e0e0; }
    </style>
</head>
<body>
    <h1>Generate Extension Icons</h1>
    <p>Click the button to download the 16x16, 48x48, and 128x128 icons for the Chrome extension.</p>
    
    <div class="canvas-container">
        <canvas id="canvas16" width="16" height="16"></canvas>
        <canvas id="canvas48" width="48" height="48"></canvas>
        <canvas id="canvas128" width="128" height="128"></canvas>
    </div>

    <button onclick="downloadIcons()">Download Icons</button>

    <script>
        const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#080808"/>
  <polygon points="16,4 22,13 10,13" fill="#ffffff" opacity="0.95"/>
  <polygon points="16,9 23.5,20 8.5,20" fill="#ffffff" opacity="0.85"/>
  <polygon points="16,15 25,27 7,27" fill="#ffffff" opacity="0.75"/>
  <rect x="14.5" y="27" width="3" height="3" rx="0.5" fill="#ffffff" opacity="0.6"/>
</svg>`;

        const sizes = [16, 48, 128];

        function drawToCanvas(size) {
            return new Promise((resolve) => {
                const canvas = document.getElementById(`canvas${size}`);
                const ctx = canvas.getContext('2d');
                const img = new Image();
                
                const blob = new Blob([svgContent], {type: 'image/svg+xml;charset=utf-8'});
                const url = URL.createObjectURL(blob);
                
                img.onload = function() {
                    ctx.drawImage(img, 0, 0, size, size);
                    URL.revokeObjectURL(url);
                    resolve();
                };
                img.src = url;
            });
        }

        async function init() {
            for (const size of sizes) {
                await drawToCanvas(size);
            }
        }

        function downloadIcons() {
            sizes.forEach(size => {
                const canvas = document.getElementById(`canvas${size}`);
                const link = document.createElement('a');
                link.download = `icon${size}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
            alert('Images downloaded! Move them to your extension/icons/ folder and replace the old ones.');
        }

        init();
    </script>
</body>
</html>
